[defaults]
inventory         = inventories/home/hosts.yml
roles_path        = roles
host_key_checking = False
stdout_callback   = yaml

# Vault password file — never commit this, it lives outside the repo.
# Create with: echo 'your-vault-password' > ~/.ansible_vault_pass && chmod 600 ~/.ansible_vault_pass
# vault_password_file = ~/.ansible_vault_pass

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
