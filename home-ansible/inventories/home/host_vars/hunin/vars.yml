---
# inventories/home/host_vars/hunin/vars.yml
# hunin — Ubuntu 24.04 LTS, primary Docker host
# Network managed by netplan + systemd-networkd
static_ip: "192.168.1.84"

# ── ClickHouse ────────────────────────────────────────────────────────────────
# Data lives on the attached storage at /data/clickhouse.
# Subdirs (data, logs, config) are created by the clickhouse role.
clickhouse_data_dir:   "/data/clickhouse/data"
clickhouse_logs_dir:   "/data/clickhouse/logs"
clickhouse_config_dir: "/data/clickhouse/config"

# hunin has plenty of RAM — bump metrics TTL to 6 months.
clickhouse_metrics_ttl_days: 180

# ── OpenTelemetry Collector ───────────────────────────────────────────────────
# hunin runs Docker so we want Docker stats in addition to host metrics.
otel_collect_docker_stats: true
otel_service_name: "hunin"
