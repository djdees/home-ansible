---
# playbooks/telegraf-setup.yml
# Installs Telegraf metrics agent. Targets all hosts by default.
# NOTE: Role was 'telgraf' in the original repos — corrected to 'telegraf'.
#
# Usage:
#   ansible-playbook playbooks/telegraf-setup.yml
#   ansible-playbook playbooks/telegraf-setup.yml --limit lab

- hosts: all
  become: true
  roles:
    - telegraf
