---
# playbooks/clickhouse-setup.yml
# Deploys ClickHouse in Docker on hunin with attached storage and bootstraps
# the OTEL schema (database, tables, ingest user).
#
# Prerequisites:
#   - Docker must be installed (run base-docker.yml first if needed)
#   - /data/clickhouse must exist on hunin's attached storage
#   - vault_clickhouse_admin_password and vault_clickhouse_otel_password in vault
#
# Usage:
#   ansible-playbook playbooks/clickhouse-setup.yml --ask-vault-pass
#
# To reconfigure only (no container restart unless config changed):
#   ansible-playbook playbooks/clickhouse-setup.yml --tags configure --ask-vault-pass
#
# To re-run schema only (idempotent):
#   ansible-playbook playbooks/clickhouse-setup.yml --tags schema --ask-vault-pass
#
# Tag reference:
#   dirs       — create data/logs/config subdirs
#   configure  — deploy config.xml and users.xml
#   container  — pull image and run container
#   schema     — bootstrap OTEL database, tables, and ingest user
#   clickhouse — all of the above

- name: ClickHouse Docker setup
  hosts: hunin
  become: true
  roles:
    - clickhouse
