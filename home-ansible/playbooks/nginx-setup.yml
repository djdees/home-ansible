---
# playbooks/nginx-setup.yml
# Deploys Nginx with sites defined in host_vars/<host>/vars.yml.
# Document roots and site names are per-host — no role vars to edit.
#
# Usage:
#   ansible-playbook playbooks/nginx-setup.yml --limit scribe --ask-vault-pass
#
# To update site config only (no reinstall):
#   ansible-playbook playbooks/nginx-setup.yml --limit scribe \
#     --tags sites --ask-vault-pass
#
# Tag reference:
#   install  — install Nginx, disable default site
#   sites    — deploy/update virtualhost configs
#   nginx    — everything above

- name: Nginx web server setup
  hosts: pi_servers
  become: true
  roles:
    - web_nginx
