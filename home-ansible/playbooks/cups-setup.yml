---
# playbooks/cups-setup.yml
# Installs CUPS, HP drivers, and Avahi AirPrint on print servers.
#
# Usage:
#   ansible-playbook playbooks/cups-setup.yml
#
# Tag reference:
#   install    — install packages only
#   configure  — deploy config files, enable services
#   cups       — all CUPS tasks
#   avahi      — Avahi/AirPrint tasks only

- hosts: pi_servers
  become: true
  roles:
    - base_cups
