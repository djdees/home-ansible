---
# playbooks/scribe-setup.yml
# Full setup for scribe — base Pi config, accounts, SSH hardening, and Nginx.
# CUPS is not included — the current printer is network-attached and doesn't
# need a print server. Add base_cups back here if that changes.
#
# Usage:
#   # First run — Pi still on DHCP:
#   ansible-playbook playbooks/scribe-setup.yml \
#     -e ansible_host=192.168.1.XXX --ask-vault-pass
#
#   # Subsequent runs:
#   ansible-playbook playbooks/scribe-setup.yml --ask-vault-pass
#
# To update Nginx site config only:
#   ansible-playbook playbooks/scribe-setup.yml --tags sites --ask-vault-pass

- name: Scribe server setup
  hosts: pi_servers
  become: true
  roles:
    - base_pi
    - base_user
    - user_dotfiles
    - base_ssh
    - web_nginx
