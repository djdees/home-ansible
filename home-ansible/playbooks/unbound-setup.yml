---
# playbooks/unbound-setup.yml
# Deploys Unbound recursive DNS resolver only. Use this to reconfigure
# Unbound without touching Pi-hole.
#
# Usage:
#   ansible-playbook playbooks/unbound-setup.yml
#
# Tag reference:
#   install      — install package, create dirs, enable service
#   configure    — deploy pi-hole.conf template
#   hints        — download/refresh root hints
#   internal-dns — deploy home_lan.conf zone file
#   update       — hints + internal-dns (routine refresh, no reinstall)
#   unbound      — everything above

- hosts: piholes
  become: true
  roles:
    - unbound_dns
