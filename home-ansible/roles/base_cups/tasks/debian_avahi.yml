---
# BUG FIXED: state: latest → state: present.
# BUG FIXED: 'Restart avahi' echo task removed — template tasks notify
#            the handler directly.
# BUG FIXED: avahi-daemon.conf hostname was hardcoded to 'scribe'.
#            Now uses {{ inventory_hostname }} via the template.

- name: Install avahi-utils
  ansible.builtin.apt:
    name: avahi-utils
    state: present
  become: true
  tags: [cups, avahi, install]

- name: Deploy avahi-daemon.conf
  ansible.builtin.template:
    src: avahi-daemon.conf.j2
    dest: /etc/avahi/avahi-daemon.conf
    owner: root
    group: root
    mode: '0644'
    backup: true
  become: true
  notify: restart avahi-daemon
  tags: [cups, avahi, configure]

- name: Deploy avahi hosts file
  ansible.builtin.template:
    src: avahi.hosts.j2
    dest: /etc/avahi/hosts
    owner: root
    group: root
    mode: '0644'
    backup: true
  become: true
  notify: restart avahi-daemon
  tags: [cups, avahi, configure]

- name: Deploy HP LaserJet 5MP avahi service file
  ansible.builtin.copy:
    src: HP_LaserJet_5MP.service
    dest: /etc/avahi/services/HP_LaserJet_5MP.service
    owner: root
    group: root
    mode: '0644'
    backup: true
  become: true
  notify: restart avahi-daemon
  tags: [cups, avahi, configure]

- name: Deploy HP Officejet 5600 avahi service file
  ansible.builtin.copy:
    src: HP_Officejet_5600_Series.service
    dest: /etc/avahi/services/HP_Officejet_5600_Series.service
    owner: root
    group: root
    mode: '0644'
    backup: true
  become: true
  notify: restart avahi-daemon
  tags: [cups, avahi, configure]

- name: Enable and start avahi-daemon
  ansible.builtin.systemd:
    name: avahi-daemon
    enabled: true
    state: started
    daemon_reload: true
  become: true
  tags: [cups, avahi, configure]
