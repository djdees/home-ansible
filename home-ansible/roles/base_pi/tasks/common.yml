---
# BUG FIXED: awk regex had trailing 'i' character (FS = "="i) — invalid awk
#            that silently produced empty output, leaving timezone unchanged.
# BUG FIXED: timesyncd drop-in dest was timesync.conf.d (missing trailing d).
#            systemd-timesyncd never scanned that path; custom NTP servers
#            were silently ignored.

- name: Register current timezone
  ansible.builtin.shell:
    cmd: "timedatectl show | grep ^Timezone | awk -F= '{print $2}'"
  register: current_timezone
  changed_when: false
  become: true
  tags: [base_pi, setup]

- name: Set timezone to {{ home_timezone }}
  community.general.timezone:
    name: "{{ home_timezone }}"
  become: true
  when: current_timezone.stdout != home_timezone
  notify: restart systemd-timesyncd
  tags: [base_pi, setup]

- name: Remove en_GB.UTF-8 locale
  ansible.builtin.lineinfile:
    path: /etc/locale.gen
    regexp: '^en_GB.UTF-8 UTF-8'
    line: '# en_GB.UTF-8 UTF-8'
    state: present
    backup: true
  become: true
  tags: [base_pi, setup]

- name: Enable en_US.UTF-8 locale
  ansible.builtin.lineinfile:
    path: /etc/locale.gen
    regexp: '^# en_US.UTF-8 UTF-8'
    line: 'en_US.UTF-8 UTF-8'
    state: present
    backup: true
  become: true
  tags: [base_pi, setup]

- name: Deploy custom MOTD
  ansible.builtin.copy:
    src: motd
    dest: /etc/motd
    owner: root
    group: root
    mode: '0644'
    backup: true
    force: true
  become: true
  tags: [base_pi, setup]

- name: Ensure timesyncd drop-in directory exists
  ansible.builtin.file:
    path: /usr/local/lib/systemd/timesyncd.conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
  tags: [base_pi, setup]

- name: Deploy timesyncd.conf drop-in
  ansible.builtin.template:
    src: timesyncd.conf.j2
    dest: /usr/local/lib/systemd/timesyncd.conf.d/home.conf
    owner: root
    group: root
    mode: '0644'
    backup: true
  become: true
  notify: restart systemd-timesyncd
  tags: [base_pi, setup]

- name: Check NTP status
  ansible.builtin.command: /usr/bin/timedatectl status
  register: timedatectl_result
  changed_when: false
  check_mode: false
  tags: [base_pi, setup]

- name: Enable NTP sync
  ansible.builtin.command: /usr/bin/timedatectl set-ntp true
  become: true
  when: "'Network time on: no' in timedatectl_result.stdout"
  tags: [base_pi, setup]
