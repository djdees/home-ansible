---
# BUG FIXED: original task file tried to download to /etc/{{ bundle }} then
#            unarchive from /tmp/ — mismatched paths; extraction always failed.
# BUG FIXED: telegraf group and user were created AFTER the download that
#            tried to set owner: telegraf — task would fail if user didn't exist.
# BUG FIXED: unarchive src was /tmp/ (a directory) not the actual archive path.
# BUG FIXED: TELEGRAF_BUNDLE was amd64 — hardcoded, breaks on Pi (armhf/arm64).
#            Now uses telegraf_arch map keyed on ansible_machine.
# NOTE: Role name corrected from 'telgraf' to 'telegraf' throughout.

- name: Create telegraf group
  ansible.builtin.group:
    name: telegraf
    system: true
    state: present
  become: true
  tags: [telegraf, install]

- name: Create telegraf user
  ansible.builtin.user:
    name: telegraf
    group: telegraf
    shell: /bin/false
    create_home: false
    comment: "Telegraf service account"
    system: true
    state: present
  become: true
  tags: [telegraf, install]

- name: Resolve Telegraf bundle filename
  ansible.builtin.set_fact:
    telegraf_bundle: "telegraf-{{ telegraf_version }}_linux_{{ telegraf_arch[ansible_machine] }}.tar.gz"
  tags: [telegraf, install]

- name: Download Telegraf archive
  ansible.builtin.get_url:
    url: "{{ telegraf_source }}/{{ telegraf_bundle }}"
    dest: "/tmp/{{ telegraf_bundle }}"
    owner: root
    group: root
    mode: '0440'
  become: true
  tags: [telegraf, install]

- name: Extract Telegraf archive
  ansible.builtin.unarchive:
    src: "/tmp/{{ telegraf_bundle }}"
    dest: /tmp/
    remote_src: true
  become: true
  tags: [telegraf, install]

- name: Install Telegraf binary
  ansible.builtin.copy:
    src: "/tmp/telegraf-{{ telegraf_version }}/usr/bin/telegraf"
    dest: /usr/local/bin/telegraf
    owner: root
    group: root
    mode: '0755'
    remote_src: true
  become: true
  tags: [telegraf, install]

- name: Remove Telegraf download artefacts
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/{{ telegraf_bundle }}"
    - "/tmp/telegraf-{{ telegraf_version }}"
  become: true
  tags: [telegraf, install]
