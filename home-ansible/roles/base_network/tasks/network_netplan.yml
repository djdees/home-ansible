---
# base_network/tasks/network_netplan.yml
# Sets a static IP via netplan (systemd-networkd backend).
# Used on: Ubuntu server 20.04+, including Ubuntu 24.04 Noble.
# Uses modern 'routes:' syntax — gateway4 is deprecated in Ubuntu 22.04+.

- name: Detect active ethernet interface
  ansible.builtin.shell:
    cmd: "ip -o link show | grep -v loopback | grep -v docker | grep -v 'br-' | grep -v veth | grep 'state UP' | head -1 | awk -F': ' '{print $2}'"
  register: netplan_interface
  changed_when: false
  become: true
  tags: [base_network, network, setup]

- name: Fail if no active ethernet interface found
  ansible.builtin.fail:
    msg: "No active ethernet interface found. Check: ip link show"
  when: netplan_interface.stdout == ""
  tags: [base_network, network, setup]

- name: Disable installer DHCP config if present
  ansible.builtin.shell:
    cmd: |
      for f in /etc/netplan/00-installer-config.yaml \
                /etc/netplan/01-netcfg.yaml; do
        if [ -f "$f" ]; then
          mv "$f" "${f}.disabled"
          echo "disabled $f"
        fi
      done
  become: true
  register: disabled_result
  changed_when: "'disabled' in disabled_result.stdout"
  tags: [base_network, network, setup]

- name: Deploy netplan static IP config
  ansible.builtin.template:
    src: netplan-static.yaml.j2
    dest: /etc/netplan/99_config.yaml
    owner: root
    group: root
    mode: '0600'
    backup: true
  become: true
  register: netplan_result
  tags: [base_network, network, setup]

- name: Apply netplan config (async — SSH will drop as IP changes)
  ansible.builtin.command:
    cmd: netplan apply
  become: true
  async: 10
  poll: 0
  ignore_errors: true
  when: netplan_result.changed
  tags: [base_network, network, setup]

- name: Wait for host to come back at new static IP
  ansible.builtin.wait_for_connection:
    delay: 5
    timeout: 60
  when: netplan_result.changed
  tags: [base_network, network, setup]
