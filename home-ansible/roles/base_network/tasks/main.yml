---
# base_network/tasks/main.yml
# Detects the active network manager and delegates to the appropriate
# sub-task file. Supports:
#   NetworkManager   — Bookworm/Trixie Pis, Ubuntu desktop
#   netplan          — Ubuntu server (networkd backend)
#   dhcpcd           — Bullseye and older Raspbian
#   systemd-networkd — minimal Debian server installs without netplan

- name: Detect active network manager
  ansible.builtin.shell: |
    if systemctl is-active --quiet NetworkManager; then
      echo "NetworkManager"
    elif [ -d /etc/netplan ] && systemctl is-active --quiet systemd-networkd; then
      echo "netplan"
    elif systemctl is-active --quiet dhcpcd; then
      echo "dhcpcd"
    elif systemctl is-active --quiet systemd-networkd; then
      echo "systemd-networkd"
    else
      echo "unknown"
    fi
  register: network_manager_active
  changed_when: false
  become: true
  tags: [base_network, network, setup]

- name: Show detected network manager
  ansible.builtin.debug:
    msg: "Detected network manager: {{ network_manager_active.stdout }}"
  tags: [base_network, network, setup]

- name: Configure network via NetworkManager
  ansible.builtin.include_tasks: network_nm.yml
  when: network_manager_active.stdout == "NetworkManager"
  tags: [base_network, network, setup]

- name: Configure network via netplan
  ansible.builtin.include_tasks: network_netplan.yml
  when: network_manager_active.stdout == "netplan"
  tags: [base_network, network, setup]

- name: Configure network via dhcpcd
  ansible.builtin.include_tasks: network_dhcpcd.yml
  when: network_manager_active.stdout == "dhcpcd"
  tags: [base_network, network, setup]

- name: Configure network via systemd-networkd
  ansible.builtin.include_tasks: network_networkd.yml
  when: network_manager_active.stdout == "systemd-networkd"
  tags: [base_network, network, setup]

- name: Fail if network manager not detected
  ansible.builtin.fail:
    msg: >
      Could not detect a supported network manager (NetworkManager, netplan,
      dhcpcd, or systemd-networkd). Check which service manages networking
      on this host and add support to base_network/tasks/main.yml.
  when: network_manager_active.stdout == "unknown"
  tags: [base_network, network, setup]
