---
# Deploys each site defined in apache_sites. Each site needs:
#   name:       hostname (e.g. scribe.home.arpa)
#   root:       document root path (from host_vars)
#   autoindex:  true/false — directory listing for media/PDF serving

- name: Ensure document roots exist
  ansible.builtin.file:
    path: "{{ item.root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  become: true
  loop: "{{ apache_sites }}"
  tags: [apache, sites]

- name: Deploy Apache virtualhost configs
  ansible.builtin.template:
    src: site.conf.j2
    dest: "/etc/apache2/sites-available/{{ item.name }}.conf"
    owner: root
    group: root
    mode: '0644'
    backup: true
  become: true
  loop: "{{ apache_sites }}"
  notify: restart apache2
  tags: [apache, sites]

- name: Enable Apache sites
  ansible.builtin.command:
    cmd: "a2ensite {{ item.name }}.conf"
  become: true
  loop: "{{ apache_sites }}"
  notify: restart apache2
  changed_when: false
  tags: [apache, sites]
