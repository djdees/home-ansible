---
# BUG FIXED: tags had malformed syntax (-update) — fixed to - update.
# BUG FIXED: owner was 'pi' — unbound drops to 'unbound' user at runtime.
# Downloading direct to dest; no intermediate /tmp copy needed.

- name: Download current root hints file
  ansible.builtin.get_url:
    url: "{{ unbound_root_hints_url }}"
    dest: /var/lib/unbound/root.hints
    owner: unbound
    group: unbound
    mode: '0644'
    force: true
  become: true
  notify: restart unbound
  tags: [unbound, hints, update]
