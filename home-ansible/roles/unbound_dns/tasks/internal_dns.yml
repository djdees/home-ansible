---
# unbound_dns/tasks/internal_dns.yml
# Internal DNS entries are now part of pi-hole.conf.j2 (single file
# avoids duplicate interface/port conflicts with include-toplevel).
# This task re-deploys the combined template when tagged with internal-dns.

- name: Deploy unbound config (includes internal home.arpa zone)
  ansible.builtin.template:
    src: pi-hole.conf.j2
    dest: /etc/unbound/unbound.conf.d/pi-hole.conf
    owner: root
    group: root
    mode: '0644'
    backup: true
  become: true
  notify: restart unbound
  tags: [unbound, internal-dns, update]
