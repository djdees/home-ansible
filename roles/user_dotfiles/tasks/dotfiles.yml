---
# BUG FIXED: mode was 0744 (executable bit on shell config) -> 0644.
# CONSOLIDATED: base_home/files/bashrc and base_pi/templates/bashrc were
# two slightly different copies of the same file. Now one template with
# a variable controlling the PS1 style.

- name: Deploy .bashrc for {{ ansible_user }}
  ansible.builtin.template:
    src: bashrc.j2
    dest: "/home/{{ ansible_user }}/.bashrc"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_group }}"
    mode: "0644"
  tags: [dotfiles]

- name: Deploy .zshrc for {{ ansible_user }}
  ansible.builtin.copy:
    src: zshrc
    dest: "/home/{{ ansible_user }}/.zshrc"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_group }}"
    mode: "0644"
  when: user_shell == 'zsh'
  tags: [dotfiles]

- name: Deploy .zshrc for {{ personal_user }}
  ansible.builtin.copy:
    src: zshrc
    dest: "/home/{{ personal_user }}/.zshrc"
    owner: "{{ personal_user }}"
