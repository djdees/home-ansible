---
- name: Install zsh
  ansible.builtin.package:
    name: zsh
    state: present
  become: true
  when: user_shell == 'zsh'
  tags: [dotfiles, shell]

- name: Set login shell for {{ ansible_user }}
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    shell: "{{ '/usr/bin/zsh' if user_shell == 'zsh' else '/bin/bash' }}"
  become: true
  tags: [dotfiles, shell]

- name: Set login shell for {{ personal_user }}
  ansible.builtin.user:
    name: "{{ personal_user }}"
    shell: "{{ '/usr/bin/zsh' if user_shell == 'zsh' else '/bin/bash' }}"
  become: true
  tags: [dotfiles, shell]
