---
# BUG FIXED: original used Ubuntu Docker GPG URL and Ubuntu repo on a
#            Debian/Raspbian host. GPG key auth failed; packages not found.
#            Changed to the Debian-specific URLs throughout.
# BUG FIXED: apt_key / apt_repository modules are deprecated in Ansible 2.13+.
#            Replaced with the modern signed-by keyring approach.

- name: Install Docker apt prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  become: true
  tags: [docker, install]

- name: Create Docker keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
  tags: [docker, install]

- name: Download Docker GPG key (Debian)
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: '0644'
    force: true
  become: true
  tags: [docker, install]

- name: Add Docker apt repository (Debian)
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_arch[ansible_machine] }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: true
  become: true
  tags: [docker, install]

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  become: true
  tags: [docker, install]

- name: Add ansible_user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  become: true
  tags: [docker, install]

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
    daemon_reload: true
  become: true
  tags: [docker, install]
