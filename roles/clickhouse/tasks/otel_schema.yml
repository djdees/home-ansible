---
# roles/clickhouse/tasks/otel_schema.yml

- name: Wait for ClickHouse HTTP port to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ clickhouse_http_port }}"
    delay: 3
    timeout: 60
  tags: [clickhouse, schema]

# STEP 1: Template directly to HUNIN
- name: Template OTEL schema SQL directly to remote host
  ansible.builtin.template:
    src: otel_schema.sql.j2
    dest: "/home/{{ ansible_user }}/clickhouse_otel_schema.sql"
    mode: "0600"
  check_mode: false
  become: false
  tags: [clickhouse, schema]

# STEP 2: Move the file from HUNIN's disk into the CONTAINER's disk
- name: Copy schema SQL into ClickHouse container
  ansible.builtin.command:
    argv:
      - docker
      - cp
      - "/home/{{ ansible_user }}/clickhouse_otel_schema.sql"
      - "{{ clickhouse_container_name }}:/tmp/clickhouse_otel_schema.sql"
  become: false
  changed_when: false
  tags: [clickhouse, schema]

# STEP 3: Run the client inside the container using the file now in its /tmp
- name: Execute OTEL schema inside ClickHouse container
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ clickhouse_container_name }}"
      - clickhouse-client
      - --user
      - default
      - --password
      - "{{ vault_clickhouse_admin_password }}"
      - --multiquery
      - --queries-file
      - /tmp/clickhouse_otel_schema.sql
  become: false
  changed_when: false
  no_log: "{{ ansible_no_log_tasks | default(true) }}"
  tags: [clickhouse, schema]

# STEP 4: Cleanup container
- name: Remove schema SQL tempfile from inside container
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ clickhouse_container_name }}"
      - rm
      - -f
      - /tmp/clickhouse_otel_schema.sql
  become: false
  changed_when: false
  tags: [clickhouse, schema]

# STEP 5: Cleanup HUNIN host
- name: Remove schema SQL tempfile from remote host
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/clickhouse_otel_schema.sql"
    state: absent
  become: false
  tags: [clickhouse, schema]
