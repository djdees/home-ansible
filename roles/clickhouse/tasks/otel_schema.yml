---
# roles/clickhouse/tasks/otel_schema.yml
# Bootstraps the OTEL database, tables, and ingest user.
# SQL is templated locally, copied to the remote host, then copied INTO the
# container via "docker cp" before being executed with "docker exec".
# This avoids the stdin-redirect + sudo pseudo-TTY conflict that breaks
# "docker exec -i ... < file" when Ansible uses become: true.
# All statements are idempotent (IF NOT EXISTS). Safe to re-run.

- name: Wait for ClickHouse HTTP port to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ clickhouse_http_port }}"
    delay: 3
    timeout: 60
  tags: [clickhouse, schema]

- name: Template OTEL schema SQL to control machine tempfile
  ansible.builtin.template:
    src: otel_schema.sql.j2
    dest: /tmp/clickhouse_otel_schema.sql
    mode: '0600'
  delegate_to: localhost
  become: false
  tags: [clickhouse, schema]

- name: Copy schema SQL to remote host
  ansible.builtin.copy:
    src: /tmp/clickhouse_otel_schema.sql
    dest: "/home/{{ ansible_user }}/clickhouse_otel_schema.sql"
    mode: '0600'
  become: false
  tags: [clickhouse, schema]

- name: Copy schema SQL into ClickHouse container
  ansible.builtin.command:
    argv:
      - docker
      - cp
      - "/home/{{ ansible_user }}/clickhouse_otel_schema.sql"
      - "{{ clickhouse_container_name }}:/tmp/clickhouse_otel_schema.sql"
  become: false
  changed_when: false
  tags: [clickhouse, schema]

- name: Execute OTEL schema inside ClickHouse container
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ clickhouse_container_name }}"
      - clickhouse-client
      - --user
      - default
      - --password
      - "{{ vault_clickhouse_admin_password }}"
      - --multiquery
      - --queries-file
      - /tmp/clickhouse_otel_schema.sql
  become: false
  changed_when: false
  no_log: true
  tags: [clickhouse, schema]

- name: Remove schema SQL tempfile from inside container
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ clickhouse_container_name }}"
      - rm
      - -f
      - /tmp/clickhouse_otel_schema.sql
  become: false
  changed_when: false
  tags: [clickhouse, schema]

- name: Remove schema SQL tempfile from remote host
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/clickhouse_otel_schema.sql"
    state: absent
  become: false
  tags: [clickhouse, schema]

- name: Remove schema SQL tempfile from control machine
  ansible.builtin.file:
    path: /tmp/clickhouse_otel_schema.sql
    state: absent
  delegate_to: localhost
  become: false
  tags: [clickhouse, schema]
