---
# roles/clickhouse/tasks/container.yml
# Runs the ClickHouse container with host storage bind-mounted.
# Uses restart: unless-stopped so it survives reboots without a compose file.
# The default user password is set via CLICKHOUSE_PASSWORD env var at container
# startup -- this avoids storing plaintext or managing SHA256 in users.xml.

- name: Pull ClickHouse image
  community.docker.docker_image:
    name: "{{ clickhouse_image }}:{{ clickhouse_image_tag }}"
    source: pull
  become: true
  tags: [clickhouse, container]

- name: Run ClickHouse container
  community.docker.docker_container:
    name: "{{ clickhouse_container_name }}"
    image: "{{ clickhouse_image }}:{{ clickhouse_image_tag }}"
    state: started
    restart_policy: unless-stopped
    ulimits:
      - "nofile:{{ clickhouse_nofile_soft }}:{{ clickhouse_nofile_hard }}"
    env:
      CLICKHOUSE_PASSWORD: "{{ vault_clickhouse_admin_password }}"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "{{ clickhouse_http_port }}:8123"
      - "{{ clickhouse_tcp_port }}:9000"
    volumes:
      - "{{ clickhouse_data_dir }}:/var/lib/clickhouse"
      - "{{ clickhouse_logs_dir }}:/var/log/clickhouse-server"
      - "{{ clickhouse_config_dir }}:/etc/clickhouse-server/config.d"
    capabilities:
      - SYS_NICE
      - NET_ADMIN
      - IPC_LOCK
  become: true
  no_log: "{{ ansible_no_log_tasks | default(true) }}"
  tags: [clickhouse, container]
