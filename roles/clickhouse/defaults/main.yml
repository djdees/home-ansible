---
# roles/clickhouse/defaults/main.yml

# Docker image — pin to a specific version in host_vars if you want
# reproducible rebuilds. "latest" tracks the current LTS.
clickhouse_image: "clickhouse/clickhouse-server"
clickhouse_image_tag: "latest"
clickhouse_container_name: "clickhouse"

# Host paths — /data/clickhouse already exists on hunin's attached storage.
# Override in host_vars if the path differs on another host.
clickhouse_data_dir:  "/data/clickhouse/data"
clickhouse_logs_dir:  "/data/clickhouse/logs"
clickhouse_config_dir: "/data/clickhouse/config"

# Ports exposed on the host — change if something else owns these
clickhouse_http_port: 8123   # HTTP / Play UI
clickhouse_tcp_port:  9000   # Native TCP (used by OTEL exporter)

# ClickHouse default admin password — from vault
# vault_clickhouse_admin_password must be set in vault

# OpenTelemetry database and ingest user created during bootstrap
clickhouse_otel_database: "otel"
clickhouse_otel_user:     "otel_ingest"
# Password from vault: vault_clickhouse_otel_password

# TTL in days for each signal type — easy to tune per deployment
clickhouse_traces_ttl_days:  30
clickhouse_metrics_ttl_days: 90
clickhouse_logs_ttl_days:    30

# ulimits recommended by ClickHouse docs
clickhouse_nofile_soft: 262144
clickhouse_nofile_hard: 262144
