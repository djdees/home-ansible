---
# Creates the personal user (djdees), grants passwordless sudo,
# and copies the SSH public key from the control machine.
# Runs as the bootstrap user (fixer) via ansible_user in group_vars.

- name: Create personal user group
  ansible.builtin.group:
    name: "{{ personal_user_group }}"
    state: present
  become: true
  tags: [base_user, setup]

- name: Create personal user account
  ansible.builtin.user:
    name: "{{ personal_user }}"
    group: "{{ personal_user_group }}"
    groups: sudo
    append: true
    shell: "{{ '/usr/bin/zsh' if user_shell == 'zsh' else '/bin/bash' }}"
    create_home: true
    state: present
  become: true
  tags: [base_user, setup]

- name: Grant personal user passwordless sudo
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/010_{{ personal_user }}-nopasswd"
    content: "{{ personal_user }} ALL=(ALL) NOPASSWD: ALL\n"
    owner: root
    group: root
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s
  become: true
  tags: [base_user, setup]

- name: Ensure .ssh directory exists for personal user
  ansible.builtin.file:
    path: "/home/{{ personal_user }}/.ssh"
    state: directory
    owner: "{{ personal_user }}"
    group: "{{ personal_user_group }}"
    mode: '0700'
  become: true
  tags: [base_user, setup]

- name: Deploy authorized_keys for personal user
  ansible.posix.authorized_key:
    user: "{{ personal_user }}"
    state: present
    key: "{{ lookup('file', personal_user_pubkey) }}"
  become: true
  tags: [base_user, setup]
