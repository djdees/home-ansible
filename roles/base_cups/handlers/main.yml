---
# BUG FIXED: switched from service module to systemd module for consistency.
# BUG FIXED: become: true added to both handlers.

- name: restart cups
  ansible.builtin.systemd:
    name: cups
    state: restarted
  become: true
  listen: "restart cups"

- name: restart avahi-daemon
  ansible.builtin.systemd:
    name: avahi-daemon
    state: restarted
  become: true
  listen: "restart avahi-daemon"
