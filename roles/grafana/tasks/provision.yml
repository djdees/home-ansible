---
# roles/grafana/tasks/provision.yml
# Deploys datasource and dashboard provisioning configs plus the dashboard JSON.
# Grafana auto-loads everything from the provisioning volume on startup.

- name: Deploy ClickHouse datasource provisioning config
  ansible.builtin.template:
    src: datasource.yaml.j2
    dest: "{{ grafana_provisioning_dir }}/datasources/clickhouse.yaml"
    owner: "472"
    group: "472"
    mode: '0640'
  become: true
  no_log: "{{ ansible_no_log_tasks | default(true) }}"
  notify: restart grafana
  tags: [grafana, provision]

- name: Deploy dashboard provisioning config
  ansible.builtin.copy:
    src: provisioning/dashboards/dashboards.yaml
    dest: "{{ grafana_provisioning_dir }}/dashboards/dashboards.yaml"
    owner: "472"
    group: "472"
    mode: '0644'
  become: true
  notify: restart grafana
  tags: [grafana, provision]

- name: Create dashboard storage directory
  ansible.builtin.file:
    path: "{{ grafana_provisioning_dir }}/dashboards/json"
    state: directory
    owner: "472"
    group: "472"
    mode: '0755'
  become: true
  tags: [grafana, provision]

- name: Deploy home metrics dashboard JSON
  ansible.builtin.copy:
    src: dashboards/home_metrics.json
    dest: "{{ grafana_provisioning_dir }}/dashboards/json/home_metrics.json"
    owner: "472"
    group: "472"
    mode: '0644'
  become: true
  notify: restart grafana
  tags: [grafana, provision]
