---
# BUG FIXED: version was 1.15.8 (Feb 2021) — bumped to current stable.
# Update golang_version and golang_checksums here when a new release ships.
golang_version: "1.22.4"
golang_base_url: "https://golang.org/dl"

# Architecture map — covers Pi 3/4 (armv7l), Pi 4 64-bit (aarch64), x86_64
# BUG FIXED: aarch64 (arm64) entry added — was missing, broke Pi 4 64-bit.
golang_arch:
  armv7l:  "linux-armv6l.tar.gz"
  armv6l:  "linux-armv6l.tar.gz"
  aarch64: "linux-arm64.tar.gz"
  x86_64:  "linux-amd64.tar.gz"

golang_checksums:
  armv7l:  "https://dl.google.com/go/go{{ golang_version }}.linux-armv6l.tar.gz.sha256"
  aarch64: "https://dl.google.com/go/go{{ golang_version }}.linux-arm64.tar.gz.sha256"
  x86_64:  "https://dl.google.com/go/go{{ golang_version }}.linux-amd64.tar.gz.sha256"
