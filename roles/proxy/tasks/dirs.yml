---
- name: Create proxy directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: '0755'
  loop:
    - { path: "{{ proxy_config_dir }}", owner: root, group: root }
    - { path: "{{ proxy_static_dir }}", owner: root, group: root }
    - { path: "{{ proxy_logs_dir }}",   owner: "65532", group: "65532" }
  become: true
  tags: [proxy, dirs]

- name: Create proxy certs directory
  ansible.builtin.file:
    path: "{{ proxy_certs_dir }}"
    state: directory
    owner: root
    group: "65532"
    mode: '0750'
  become: true
  tags: [proxy, dirs]
