---
# roles/otel_collector/tasks/configure.yml

# The password is kept out of the config file entirely — injected at runtime
# via an EnvironmentFile loaded by the systemd unit. The config references
# ${CLICKHOUSE_PASSWORD} which systemd expands before starting the process.

- name: Deploy ClickHouse password environment file
  ansible.builtin.template:
    src: otelcol.env.j2
    dest: /etc/otelcol-contrib/otelcol.env
    owner: root
    group: root
    mode: '0600'
  become: true
  no_log: true
  notify: restart otelcol
  tags: [otel, configure]

- name: Ensure systemd unit loads the environment file
  ansible.builtin.lineinfile:
    path: /lib/systemd/system/otelcol-contrib.service
    insertafter: '^\[Service\]'
    line: 'EnvironmentFile=/etc/otelcol-contrib/otelcol.env'
    regexp: '^EnvironmentFile='
  become: true
  notify: restart otelcol
  tags: [otel, configure]

- name: Deploy otelcol-contrib config
  ansible.builtin.template:
    src: otelcol.yaml.j2
    dest: /etc/otelcol-contrib/config.yaml
    owner: root
    group: root
    mode: '0640'
    backup: true
    validate: otelcol-contrib validate --config=%s
  become: true
  notify: restart otelcol
  tags: [otel, configure]
