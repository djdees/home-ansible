---
# roles/otel_collector/tasks/install.yml
# Installs otelcol-contrib from the official OpenTelemetry apt repository.
# The contrib distribution includes the ClickHouse exporter.

- name: Ensure apt-transport-https is present
  ansible.builtin.apt:
    name: apt-transport-https
    state: present
  become: true
  tags: [otel, install]

- name: Create keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
  tags: [otel, install]

- name: Download OpenTelemetry GPG key
  ansible.builtin.get_url:
    url: https://packages.opentelemetry.io/debian/gpg.key
    dest: /etc/apt/keyrings/opentelemetry.asc
    owner: root
    group: root
    mode: '0644'
    force: true
  become: true
  tags: [otel, install]

- name: Add OpenTelemetry apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/opentelemetry.asc]
      https://packages.opentelemetry.io/debian/{{ ansible_distribution_release }} stable main
    filename: opentelemetry
    state: present
    update_cache: true
  become: true
  tags: [otel, install]

- name: Install otelcol-contrib
  ansible.builtin.apt:
    name: otelcol-contrib
    state: latest
  become: true
  notify: restart otelcol
  tags: [otel, install]

- name: Enable otelcol-contrib service
  ansible.builtin.systemd:
    name: otelcol-contrib
    enabled: true
    daemon_reload: true
  become: true
  tags: [otel, install]
