---
# roles/otel_collector/tasks/install.yml
# Installs otelcol-contrib from GitHub releases as a .deb package.
# The contrib distribution includes the ClickHouse exporter.
# Pin the version in defaults/main.yml - check for new releases at:
# https://github.com/open-telemetry/opentelemetry-collector-releases/releases

- name: Determine system architecture for package download
  ansible.builtin.set_fact:
    otel_deb_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
  tags: [otel, install]

- name: Download otelcol-contrib .deb from GitHub releases
  ansible.builtin.get_url:
    url: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v{{ otel_version }}/otelcol-contrib_{{ otel_version }}_linux_{{ otel_deb_arch }}.deb"
    dest: "/tmp/otelcol-contrib_{{ otel_version }}_linux_{{ otel_deb_arch }}.deb"
    mode: '0644'
  become: true
  tags: [otel, install]

- name: Install otelcol-contrib .deb package
  ansible.builtin.apt:
    deb: "/tmp/otelcol-contrib_{{ otel_version }}_linux_{{ otel_deb_arch }}.deb"
    state: present
  become: true
  notify: restart otelcol
  tags: [otel, install]

- name: Remove downloaded .deb package
  ansible.builtin.file:
    path: "/tmp/otelcol-contrib_{{ otel_version }}_linux_{{ otel_deb_arch }}.deb"
    state: absent
  become: true
  tags: [otel, install]

- name: Remove any pre-existing manual otelcol-contrib service file
  ansible.builtin.file:
    path: /etc/systemd/system/otelcol-contrib.service
    state: absent
  become: true
  notify: restart otelcol
  tags: [otel, install]

- name: Remove legacy manual otelcol-contrib binary if present
  ansible.builtin.file:
    path: /usr/local/bin/otelcol-contrib
    state: absent
  become: true
  tags: [otel, install]

- name: Remove legacy manual otelcol config directory if present
  ansible.builtin.file:
    path: /etc/otel
    state: absent
  become: true
  tags: [otel, install]

- name: Add otelcol-contrib user to docker group for docker_stats receiver
  ansible.builtin.user:
    name: otelcol-contrib
    groups: docker
    append: true
  become: true
  notify: restart otelcol
  tags: [otel, install]

- name: Add otelcol-contrib user to systemd-journal group for journald receiver
  ansible.builtin.user:
    name: otelcol-contrib
    groups: systemd-journal
    append: true
  become: true
  notify: restart otelcol
  tags: [otel, install]

- name: Enable otelcol-contrib service
  ansible.builtin.systemd:
    name: otelcol-contrib
    enabled: true
    daemon_reload: true
  become: true
  tags: [otel, install]
