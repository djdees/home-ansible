---
# inventories/home/hosts.yml
# Single source of truth for all home-network hosts.
#
# Each Pi has two address fields:
#   ansible_host  — where Ansible connects (use DHCP address with -e to
#                   override on first run; permanent value is the static IP)
#   pi_static_ip  — written into network config by base_network role
#
# First run on a new Pi:
#   ansible-playbook playbooks/base-pi-setup.yml --limit newpi \
#     -e ansible_host=192.168.1.YYY --ask-vault-pass
# After reboot at static IP no override is needed.
all:
  children:
    # ── Raspberry Pi nodes ────────────────────────────────────────────────────
    pi_nodes:
      children:
        lab:
          hosts:
            pi00: { ansible_host: 192.168.1.90, pi_static_ip: 192.168.1.90 }
            pi01: { ansible_host: 192.168.1.91, pi_static_ip: 192.168.1.91 }
            pi02: { ansible_host: 192.168.1.92, pi_static_ip: 192.168.1.92 }
            pi03: { ansible_host: 192.168.1.93, pi_static_ip: 192.168.1.93 }
            pi04: { ansible_host: 192.168.1.94, pi_static_ip: 192.168.1.94 }
        piholes:
          hosts:
            pihole: { ansible_host: 192.168.1.8, pi_static_ip: 192.168.1.8 }
        pi_servers:
          hosts:
            scribe: { ansible_host: 192.168.1.83, pi_static_ip: 192.168.1.83 }
    # ── General Linux servers / desktops ─────────────────────────────────────
    infra_servers:
      hosts:
        hunin: { ansible_host: 192.168.1.84 }
        munin: { ansible_host: 192.168.1.85 }
    # ── OpenTelemetry nodes — run otel-setup.yml to deploy collector ──────────
    otel_nodes:
      hosts:
        muspell:
          ansible_host: 192.168.1.198
          ansible_connection: local
        hunin: {}   # inherits from infra_servers
    # ── Local control machine ─────────────────────────────────────────────────
    control:
      hosts:
        localhost:
          ansible_connection: local
