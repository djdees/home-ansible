---
# inventories/home/host_vars/scribe/vars.yml
# Per-host variables for scribe — print server and web server.
#
# Document roots use the external SSD mount point as the base.
# Adjust ssd_mount if your SSD is mounted at a different path.
ssd_mount: "/mnt/external"

# Nginx site definitions — used by web_nginx role.
# autoindex: true enables directory listings (useful for PDF/media browsing).
nginx_sites:
  - name: "scribe.home.arpa"
    root: "{{ ssd_mount }}/scribe"
    autoindex: false
  - name: "thecity.home.arpa"
    root: "{{ ssd_mount }}/thecity"
    autoindex: true

# Apache site definitions — used by web_apache role.
# Same paths — lets you compare both servers on the same content.
apache_sites:
  - name: "scribe.home.arpa"
    root: "{{ ssd_mount }}/scribe"
    autoindex: false
  - name: "thecity.home.arpa"
    root: "{{ ssd_mount }}/thecity"
    autoindex: true
