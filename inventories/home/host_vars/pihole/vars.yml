---
# inventories/home/host_vars/pihole/vars.yml
# pihole — Raspberry Pi 3, Pi-hole v6 + Unbound, critical DNS infrastructure.
#
# OpenTelemetry settings are intentionally conservative:
# - Longer scrape interval to reduce CPU/memory pressure on the Pi
# - No journald logs — pihole/unbound are very chatty and this is
#   critical infrastructure; keep the collector footprint minimal
# - No Docker stats — pihole runs natively, not in containers
otel_service_name: "pihole"
otel_collect_host_metrics: true
otel_collect_journald_logs: false
otel_collect_docker_stats: false
otel_metrics_interval: "60s"
