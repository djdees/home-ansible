---
# playbooks/localhost-info.yml
# Prints OS facts for the Ansible control machine (your desktop/laptop).
# Useful for verifying the control node before a deployment run.
#
# Usage:
#   ansible-playbook playbooks/localhost-info.yml

- name: Localhost info
  hosts: localhost
  gather_facts: true
  become: false
  tasks:
    - name: Print control node facts
      ansible.builtin.debug:
        msg:
          - "Distribution:       {{ ansible_distribution }}"
          - "Version:            {{ ansible_distribution_version }}"
          - "Major version:      {{ ansible_distribution_major_version }}"
          - "Release:            {{ ansible_distribution_release }}"
          - "Architecture:       {{ ansible_machine }}"
