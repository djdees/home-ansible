---
# playbooks/site.yml
# Full bootstrap — applies base configuration to every host type.
#
#   pi_nodes      → base_pi + accounts + dotfiles + SSH
#   pi_servers    → same as pi_nodes (scribe, etc.)
#   infra_servers → base_linux + accounts + dotfiles + SSH
#
# muspell (control machine) is NOT included here — it's managed separately
# since it runs the playbooks and bootstraps itself via localhost connection.
#
# Usage:
#   ansible-playbook playbooks/site.yml --ask-vault-pass
#   ansible-playbook playbooks/site.yml --limit piholes --ask-vault-pass
#   ansible-playbook playbooks/site.yml --limit infra_servers --ask-vault-pass

- name: Bootstrap Raspberry Pi nodes
  hosts: pi_nodes
  become: true
  roles:
    - base_pi
    - base_user
    - user_dotfiles
    - base_ssh

- name: Bootstrap Raspberry Pi servers
  hosts: pi_servers
  become: true
  roles:
    - base_pi
    - base_user
    - user_dotfiles
    - base_ssh

- name: Bootstrap Linux servers and desktops
  hosts: infra_servers
  become: true
  roles:
    - base_linux
    - base_user
    - user_dotfiles
    - base_ssh
