---
# playbooks/dns-stack-setup.yml
# Deploys the complete DNS stack (Unbound + Pi-hole) in one run.
# Role order is explicit here for documentation clarity; the meta dependency
# in pihole_dns also enforces it.
#
# Usage:
#   ansible-playbook playbooks/dns-stack-setup.yml
#
# Refresh hints and internal DNS only (no reinstall):
#   ansible-playbook playbooks/dns-stack-setup.yml --tags update

- hosts: piholes
  become: true
  roles:
    - unbound_dns
    - pihole_dns
